logging:
  level:
    com.dbserver.votacao: INFO
    org.springframework.web: INFO
    org.hibernate.SQL: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics, prometheus
  endpoint:
    health:
      show-details: always
    prometheus:
      enabled: true

spring:
  profiles:
    active: dev # Default para desenvolvimento local

  datasource:
    hikari:
      maximum-pool-size: 20 # Bônus 3: Performance em alta concorrência
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000

  jpa:
    open-in-view: false # Bônus 3: Evita segurar conexão de banco à toa
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        jdbc.batch_size: 50 # Performance para inserções em massa
        order_inserts: true

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

app:
  integration:
    user-info:
      url: "https://user-info.herokuapp.com/users" # URL que o orquestrador usou no Adapter

---
# Profile de Desenvolvimento (Postgres Docker)
spring:
  config:
    activate:
      on-profile: dev
  datasource:
    url: jdbc:postgresql://localhost:5432/votacao_db
    username: admin
    password: admin
    driver-class-name: org.postgresql.Driver

---
# Profile de Teste (H2 in-memory)
spring:
  config:
    activate:
      on-profile: test
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop